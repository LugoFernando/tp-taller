<header class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="logo">
      <span class="logo-text">Cafeteria</span>
    </a>

    <nav class="nav-center">
      <p-button label="MENU" [text]="true" routerLink="/menu" routerLinkActive="active" styleClass="nav-link-btn" />
      @if (auth.estaAutenticado()) {
        <p-button label="PEDIDOS" [text]="true" routerLink="/pedidos" routerLinkActive="active" styleClass="nav-link-btn" />
        <p-button icon="pi pi-shopping-cart" [text]="true" routerLink="/carrito" routerLinkActive="active" styleClass="nav-link-btn" ariaLabel="Carrito" />
        @if (auth.esAdmin()) {
          <p-button label="ADMIN" [text]="true" routerLink="/productos/list-productos" routerLinkActive="active" styleClass="nav-link-btn" />
        }
      }
    </nav>

    <div class="nav-actions">
      @if (auth.estaAutenticado()) {
        <div class="user-info">
          <img src="/images/usuario/default.png" alt="Usuario" class="user-avatar" />
          <span class="user-greeting">Hola {{ auth.obtenerNombre() }}</span>
          <p-button [text]="true" class="nav-link-btn" routerLink="/auth/mi-perfil" routerLinkActive="active" styleClass="nav-link-btn">Mi perfil</p-button>
        </div>
        <p-button
          label="Salir"
          [outlined]="true"
          severity="secondary"
          styleClass="btn-rounded btn-salir"
          (onClick)="logout()"
        />
      } @else {
        <p-button label="Ingresar" [text]="true" routerLink="/auth/login" />
        <p-button label="Registrarse" routerLink="/auth/register" styleClass="btn-rounded btn-accent" />
      }
    </div>
  </div>
</header>
