<div class="login-wrapper">
  <div class="login-card">
    <p-card header="Iniciar Sesion">
      <p-toast position="top-center" />
      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="field">
          <label for="email">Email</label>
          <input pInputText id="email" formControlName="email" type="email" placeholder="tu@email.com" />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true"
            styleClass="w-full" inputStyleClass="w-full" />
        </div>

        <div class="button-wrapper">
          <p-button type="submit" label="Ingresar" [loading]="loading" />
        </div>
        <div class="register-link">
          ¿No tenes cuenta? <a routerLink="/auth/register">Registrate</a>
        </div>

      </form>
    </p-card>
  </div>
</div>
