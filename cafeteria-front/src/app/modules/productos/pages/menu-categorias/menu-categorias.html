<section class="page-container">
  <div class="page-header">
    <h1>Nuestro Menu</h1>
    <p>Descubri nuestros cafes y postres</p>
    <p-inputgroup class="search-bar">
      <input
        pInputText
        type="text"
        [(ngModel)]="busqueda"
        (keyup.enter)="buscar()"
        placeholder="Buscar por nombre..."
      />
      <p-inputgroup-addon>
        <p-button icon="pi pi-search" (onClick)="buscar()" styleClass="btn-rounded" ariaLabel="Buscar" />
      </p-inputgroup-addon>
    </p-inputgroup>
  </div>

  <div class="category-layout">
    <div class="category-row row-top">
      @for (cat of filaSuperior; track cat.slug) {
        <p-card styleClass="category-card" [routerLink]="['/menu/categoria', cat.slug]">
          <img [src]="cat.imagen" [alt]="cat.nombre" class="category-image" />
          <h3>{{ cat.nombre }}</h3>
        </p-card>
      }
    </div>
    <div class="category-row row-bottom">
      @for (cat of filaInferior; track cat.slug) {
        <p-card styleClass="category-card" [routerLink]="['/menu/categoria', cat.slug]">
          <img [src]="cat.imagen" [alt]="cat.nombre" class="category-image" />
          <h3>{{ cat.nombre }}</h3>
        </p-card>
      }
    </div>
  </div>
</section>
