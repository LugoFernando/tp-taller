<p-table [value]="productos()" [tableStyle]="{ 'min-width': '50rem' }">

    <ng-template #header>
        <tr>
            <th>Id</th>
            <th>Nombre</th>
            <th>Descripcion</th>
            <th>Clasificacion</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
    </ng-template>

    <ng-template #caption>
        <div class="row">
            <div class="col text-end">
                <p-button
                    icon="pi pi-plus"
                    (onClick)="createProducto()">
                </p-button>
            </div>
        </div>
    </ng-template>

    <ng-template #body let-producto>
        <tr>
            <td>{{ producto.id }}</td>
            <td>{{ producto.nombre }}</td>
            <td>{{ producto.descripcion }}</td>
            <td>{{ producto.clasificacion }}</td>
            <td>${{ producto.precio }}</td>

            <td>
                <div class="row">
                    <div class="col">
                        <p-button
                            (onClick)="editarProducto(producto)"
                            icon="pi pi-pencil">
                        </p-button>
                    </div>

                    <div class="col">
                        <p-button
                            (onClick)="verProducto(producto)"
                            icon="pi pi-eye">
                        </p-button>
                    </div>

                    <div class="col">
                        <p-button
                            (onClick)="eliminarProducto(producto)"
                            icon="pi pi-trash">
                        </p-button>
                    </div>
                </div>
            </td>
        </tr>
    </ng-template>

</p-table>
