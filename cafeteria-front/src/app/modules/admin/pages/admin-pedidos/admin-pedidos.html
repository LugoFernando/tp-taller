<section class="page-container admin-page">
  <div class="admin-top">
    <p-button icon="pi pi-arrow-left" [text]="true" routerLink="/admin" ariaLabel="Volver" />
    <h1>Pedidos</h1>
  </div>

  @if (cargando()) {
    <div class="center-state">
      <p-progressSpinner strokeWidth="4" />
    </div>
  } @else if (pedidos().length === 0) {
    <p-message severity="info" styleClass="w-full">
      No hay pedidos registrados todavia
    </p-message>
  } @else {
    <div class="table-wrap">
      <p-table [value]="pedidos()" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
          <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Total</th>
            <th>Usuario</th>
            <th>Email</th>
          </tr>
        </ng-template>
        <ng-template #body let-p>
          <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
            <td>${{ p.total | number:'1.0-0' }}</td>
            <td>{{ p.usuarioNombre }}</td>
            <td>{{ p.usuarioEmail }}</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  }
</section>
