<section class="page-container admin-page">
  <div class="admin-top">
    <p-button icon="pi pi-arrow-left" [text]="true" routerLink="/admin" ariaLabel="Volver" />
    <h1>Cuentas registradas</h1>
  </div>

  @if (cargando()) {
    <div class="center-state">
      <p-progressSpinner strokeWidth="4" />
    </div>
  } @else {
    <div class="table-wrap">
      <p-table [value]="usuarios()" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Direccion</th>
            <th>Rol</th>
          </tr>
        </ng-template>
        <ng-template #body let-u>
          <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.nombre }}</td>
            <td>{{ u.apellido }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.direccion }}</td>
            <td>{{ u.rol }}</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  }
</section>
